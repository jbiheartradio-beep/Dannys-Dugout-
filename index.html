<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danny's Dugout | Adult Softball Lessons</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@700&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --logo-lime: #a3e635;
            --logo-navy: #0f172a;
        }
        body { background-color: #f8fafc; font-family: 'Oswald', sans-serif; }
        .jersey-font { font-family: 'Teko', sans-serif; text-transform: uppercase; letter-spacing: 2px; }
        .hero-bg {
            background: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.85)), 
                        url('https://images.unsplash.com/photo-1593341646782-e0b495cff86d?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="m-0 p-0">

    <nav class="bg-white p-4 flex justify-between items-center shadow-lg sticky top-0 z-50 border-b-4 border-lime-400">
        <div class="flex items-center space-x-3">
            <img src="logo.jpg" alt="Logo" class="h-12 w-auto rounded shadow-sm">
            <span class="text-3xl jersey-font text-slate-900">Danny's Dugout</span>
        </div>
        <a href="tel:7274887476" class="bg-slate-900 text-lime-400 px-6 py-2 rounded-full jersey-font hover:scale-105 transition">Call/Text</a>
    </nav>

    <header class="hero-bg text-white py-24 px-6 text-center border-b-8 border-lime-400">
        <div class="max-w-4xl mx-auto flex flex-col items-center">
            <img src="logo.jpg" alt="Danny's Dugout" class="h-48 md:h-64 w-auto mb-8 shadow-2xl rounded-3xl border-4 border-lime-400 bg-white p-1">
            <h1 class="text-7xl md:text-9xl jersey-font italic leading-none">Softball</h1>
            <p class="text-3xl md:text-5xl uppercase font-bold text-lime-400 mb-8">Adult Slow Pitch Lessons</p>
            <div class="bg-white text-slate-950 px-10 py-2 transform -skew-x-12 font-black text-2xl shadow-xl">
                WEEKENDS ONLY
            </div>
        </div>
    </header>

    <section class="max-w-4xl mx-auto py-20 px-6">
        <div class="bg-white p-10 rounded-2xl shadow-2xl border-l-8 border-lime-400">
            <h2 class="text-5xl jersey-font mb-10 text-slate-900 text-center">Lesson Rates</h2>
            <div class="grid md:grid-cols-2 gap-8">
                <div class="flex justify-between items-center bg-slate-50 p-6 rounded-xl border border-slate-200">
                    <span class="text-2xl font-bold">1-Hour</span>
                    <span class="text-4xl font-black text-lime-600">$60</span>
                </div>
                <div class="flex justify-between items-center bg-slate-50 p-6 rounded-xl border border-slate-200">
                    <span class="text-2xl font-bold">2-Hour</span>
                    <span class="text-4xl font-black text-lime-600">$100</span>
                </div>
            </div>
            <p class="text-center mt-10 text-xl italic text-slate-500">"Train Like A Pro Today"</p>
        </div>
    </section>

    <section class="bg-slate-900 py-20 px-6 text-center">
        <h3 class="text-4xl jersey-font text-white mb-8 tracking-widest text-lime-400">Ready to Hit?</h3>
        <a href="tel:7274887476" class="inline-block bg-white text-slate-900 text-5xl md:text-6xl jersey-font px-12 py-6 rounded-2xl shadow-2xl hover:bg-lime-400 transition transform hover:scale-105">
            (727) 488-7476
        </a>
    </section>

    <footer class="bg-slate-950 text-white py-12 text-center">
        <img src="logo.jpg" alt="Footer Logo" class="h-20 mx-auto mb-6 opacity-50 grayscale hover:grayscale-0 transition">
        <p class="text-sm text-slate-500 uppercase tracking-widest italic">Tampa, FL | dlieber33@gmail.com</p>
    </footer>

</body>
</html>
