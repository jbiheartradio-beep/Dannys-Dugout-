<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danny's Dugout | Adult Softball Lessons</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@700&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --logo-lime: #a3e635; --logo-navy: #0f172a; }
        body { background-color: #fdfbf7; font-family: 'Oswald', sans-serif; }
        .jersey-font { font-family: 'Teko', sans-serif; text-transform: uppercase; letter-spacing: 2px; }
        .hero-bg {
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), 
                        url('https://images.unsplash.com/photo-1593341646782-e0b495cff86d?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body>

    <nav class="bg-white p-4 flex justify-between items-center shadow-md sticky top-0 z-50 border-b-4 border-lime-400">
        <div class="flex items-center space-x-3">
            <img src="logo.jpg" alt="Logo" class="h-10 w-auto rounded">
            <span class="text-2xl jersey-font text-slate-900">Danny's Dugout</span>
        </div>
        <a href="#contact" class="bg-slate-900 text-lime-400 px-6 py-2 rounded-full jersey-font hover:bg-lime-400 hover:text-slate-900 transition">Contact Me</a>
    </nav>

    <header class="hero-bg text-white py-20 px-6 text-center border-b-8 border-lime-400">
        <img src="logo.jpg" alt="Logo" class="h-40 w-auto mx-auto mb-6 rounded-3xl border-4 border-lime-400 bg-white p-1 shadow-2xl">
        <h1 class="text-6xl md:text-8xl jersey-font italic leading-none">Softball</h1>
        <p class="text-2xl md:text-4xl uppercase font-bold text-lime-400 mb-10">Adult Slow Pitch Lessons</p>
        
        <a href="https://calendar.google.com/calendar/u/0/r?preset=1" target="_blank" class="inline-block bg-white text-slate-900 px-10 py-4 font-black text-xl jersey-font rounded-xl shadow-xl hover:scale-105 transition">
            📅 VIEW CALENDAR
        </a>
    </header>

    <section id="contact" class="max-w-3xl mx-auto py-16 px-6">
        <div class="bg-white p-8 md:p-12 rounded-3xl shadow-2xl border border-slate-100">
            <h2 class="text-5xl jersey-font mb-2 text-slate-900 text-center uppercase">Contact Me Now</h2>
            <p class="text-center text-slate-500 mb-10 italic">Submissions go directly to jbiheartradio@gmail.com</p>
            
            <form action="https://formspree.io/f/YOUR_ID_HERE" method="POST" class="space-y-6">
                <div>
                    <label class="block uppercase text-xs font-bold mb-2">Name</label>
                    <input name="name" type="text" required class="w-full bg-slate-50 border border-slate-200 rounded py-3 px-4 focus:border-lime-500 outline-none">
                </div>
                <div>
                    <label class="block uppercase text-xs font-bold mb-2">Email</label>
                    <input name="email" type="email" required class="w-full bg-slate-50 border border-slate-200 rounded py-3 px-4 focus:border-lime-500 outline-none">
                </div>
                <div>
                    <label class="block uppercase text-xs font-bold mb-2">How can I help you?</label>
                    <select name="service" class="w-full bg-slate-50 border border-slate-200 rounded py-3 px-4 outline-none">
                        <option>1-Hour Lesson ($60)</option>
                        <option>2-Hour Lesson ($100)</option>
                        <option>Team BP Services</option>
                        <option>General Inquiry</option>
                    </select>
                </div>
                <div>
                    <label class="block uppercase text-xs font-bold mb-2">Message</label>
                    <textarea name="message" rows="4" class="w-full bg-slate-50 border border-slate-200 rounded py-3 px-4 focus:border-lime-500 outline-none"></textarea>
                </div>
                <button type="submit" class="w-full bg-slate-900 text-lime-400 text-3xl jersey-font py-4 rounded-xl hover:bg-lime-400 hover:text-slate-900 transition shadow-lg">
                    Send Request
                </button>
            </form>
        </div>
    </section>

    <footer class="bg-slate-950 text-slate-500 py-10 text-center">
        <p class="text-sm uppercase tracking-widest italic mb-2">Tampa, FL | jbiheartradio@gmail.com</p>
        <p class="text-xs">© 2026 Danny's Dugout</p>
    </footer>

</body>
</html>
